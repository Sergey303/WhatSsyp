<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Авторизация XAMIC</title>
    <link rel="stylesheet" href="assets/bootstrap.min.css">
    <link rel="stylesheet" href="Xamic/reg.css">
</head>
<body>
    <div id="loginPanel">
        <div class="login-wrapper">
            <div class="login-form">
                <h2>Регистрация</h2>
                <div class="input-group">
                    <label for="loginInp">Логин</label>
                    <input type="text" id="loginName" placeholder="ivan_99" required>
                </div>
                <div class="input-group">
                    <label for="passwordInp">Пароль</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <div class="input-group">
                    <label for="nameInp">Имя пользователя</label>
                    <input type="text" id="username" placeholder="Иван Иванов" required>
                </div>
                <button onclick="registration()" type="submit" style="margin-bottom: 10px;">Зарегистрироваться</button>
                <button onclick="login()" type="submit">Вход</button>
            </div>
        </div>
    </div>
    <script src="assets/signalr.min.js"></script>
    <script src="Xamic/assets/workshop-chat-helper.js"></script>
    <script src="Xamic/assets/api-helper.js"></script>
    <script src="Xamic/assets/auth-helper.js"></script>
    <script src="Xamic/app.js"></script>
</body>
</html>
