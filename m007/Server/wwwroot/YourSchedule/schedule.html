<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
	<title>Расписание</title>
    <link
    rel="stylesheet"
    href="/assets/bootstrap.min.css">
    <link
        rel="stylesheet"
        href="/YourSchedule/assets/style1.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1 class="mb-5 headline">Ваше расписание</h1>
    <div class="container">
        <div class="row">
            <div class="col-4">
                <div class="card">
                    <div class="card-body">
                        <h1 class="card-title our-title">
                            Время
                        </h1>
                        <ul class="list-group" id="times">
                            <template id="timesTemplate">
                                <li class="list-group-item">
                                <div class="time-item">Введите время задачи</div>
                                </li>
                            </template>
                        </ul>
                        <div class="d-flex gap-2 mt-4">
                            <input
                                class="form-control"
                                placeholder="Время (часы:минуты)"
                                id="timeInput">

                            <!-- <button
                                class="btn btn-primary">
                                Отправить
                            </button> -->
                        </div>
                    </div>
                </div>
                
            </div>
            <div class="col-8">
                <div class="card">
                    <div class="card-body">
                        <h1 class="card-title our-title">
                            Задачи
                        </h1>
                        <ul class="list-group" id="tasks">
                            <template id="tasksTemplate">
                                <li class="list-group-item">
                                <div class="task-item">Введите название задачи</div>
                                </li>
                            </template>
                        </ul>
                        <div class="d-flex gap-2 mt-4">
                            <input
                                class="form-control"
                                placeholder="Задача"
                                id="tasksInput">

                            <button
                                class="btn btn-primary"
                                onclick="sendPair()">
                                Отправить
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="row mt-5">
            <div class="col-4">
                <div class="card">
                    <div class="card-body">
                        <h1 class="card-title our-title our-title1">
                            Удаление задач
                        </h1>
                        <div class="d-flex gap-2 mt-4">
                            <input
                                class="form-control"
                                placeholder="Время (часы:минуты)"
                                id="timeInputForDelete">

                            <!-- <button
                                class="btn btn-primary"
                                onclick="">
                                Удалить
                            </button> -->
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-8">
                <div class="card">
                    <div class="card-body">
                        <div class="card-title our-title our-title2">
                            Удаление задач
                        </div>
                        <div class="d-flex gap-2 mt-4">
                            <input
                                class="form-control"
                                placeholder="Задача"
                                id="tasksInputForDelete">

                            <button
                                class="btn btn-primary"
                                onclick="sendPairForDelete()">
                                Удалить
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="row mt-5">
            <div class="col-12">
                <div class="inf"> Для того, чтобы отобразилось удаление задачи/размещение задач в хронологическом порядке, необходимо обновить страницу </div>
            </div>
        </div> 
    </div>
    
    <script src="/YourSchedule/assets/signalr.min.js"></script>
    <script src="/YourSchedule/assets/workshop-chat-helper.js"></script>
    <script src="/YourSchedule/assets/api-helper.js"></script>
    <script src="/YourSchedule/appForShedule.js"></script>
</body>
</html>
