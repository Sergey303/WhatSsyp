<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="assets/bootstrap.min.css">
    <link rel="stylesheet" href="styleAlexander.css">
</head>
<body>
    
     
    <div id="loginPanel" >
        <h1 class="tittle1">XAMIC</h1>
        <div class="login-wrapper">
            <div class="login-form">
                <h2>Вход в мессенджер</h2>


                <div class="input-group">
                    <label for="loginname">Логин (Login name)</label>
                    <input type="text" id="loginName" placeholder="ivan_99" required>
                </div>

                <div class="input-group">
                    <label for="password">Пароль (Password)</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="input-group">
                    <label for="username">Имя пользователя (Username)</label>
                    <input type="text" id="username" placeholder="Иван Иванов" required>
                    </div>
                
                <button onclick="registration()" type="submit" style="margin-bottom: 10px;">Зарегистрироваться</button>
                <button onclick="login()" type="submit">Вход</button>
            </div>
        </div>
    </div>


    <div id="appPanel" class="d-none">        
        <button class="logout-btn" onclick="Auth.logout()">Выйти</button>
        <div id="messages">
            <template id="file-template">
                <div class="message" style="display: block">
                    <!--siple test file downloader, old version:
                    <a class="fileHA" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTAeefR4LoJQ_nFipMLNB3nVe5sWMnzvdIogIW05YVxaWDDrySuV8kduys&s=10">download file</a>
                    -->
                    <a class="tpl-download-btn" href="#" download style="display: none">
                        Скачать файл
                    </a>
    
                    <!-- IMG: empty 1x1 (0 bytes, hidden)-->
                    <img class="tpl-img" 
                        src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" 
                        data-src="" alt="" >
    
                    <!-- VID: no link (empty, hidden) -->
                    <video class="tpl-video" controls>
                        <source src="" type="video/mp4">
                    </video>
    
                    <!-- AUD: no link (empty, hidden) -->
                    <audio class="tpl-audio" controls>
                        <source src="" type="audio/mpeg">
                    </audio>
    
                    <!-- IFrame: safe link (empty, hidden) -->
                    <iframe class="tpl-iframe" src="about:blank" sandbox="" allow-downloads data-src=""></iframe>
                    <iframe class="tpl-g-iframe" src="about:blank" sandbox="" data-src=""></iframe>
                </div>
            </template>
        </div>
    </div>
    <div id="roomPanel" class="d-none">
        <input id="roomNameInput" class="form-control" placeholder="Название комнаты">
        <button class="btn btn-primary mt-2" onclick="createRoom()">Создать комнату</button>
        <button class="btn btn-primary mt-2" onclick="joinR()" >Войти в комнату</button>
        <ul id="rooms" class="list-group mt-2" style="margin-bottom: 50px;"></ul>
    <!--
    <div class="send-row">
        <input id="nameInput" placeholder="name">
        <button onclick="showName()">
            Показать имя
        </button>
    </div>
    -->
        <input id="messageRoom" placeholder="выберите комнату">
        <input id="messageInput" placeholder="напишите сообщение">
        <button class="image-button" onclick="sendMessage()">
            &#8629; 
        </button>
    </div>

    <script src="assets/auth-helper.js"></script>
    <script src="assets/signalr.min.js"></script>
    <script src="assets/workshop-chat-helper.js"></script>
    <script src="assets/api-helper.js"></script>
    <script src="appAlexander.js"></script>
    <script src="assets/file-handler.js"></script>
</body>
<html>
