<html lang="ru">

    <title>Моя страница</title>

    <link

        href="style.css">
</head>
<body>

    <h1 class="title">Типа заголовок и тд</h1>
    <p class="title"> Типа подзаголовок и тд</p> 
<!--  р - показывает новый абзац  (перенос строки) (без этих штук текст плоский будет) -->

<a href="rules.html"
class="oform">
<!-- Атрибут href задаёт адрес.

    Так называемые правила
</a> 



<div id="mmm"
    class="hide"> 

        <h1 id="title">
            Игра
        </h1>

        <div id="hide-when-press-start"> <!-- элементы что скрываются по "начать"-->

            <div class="alert alert-info"> 
                Таймерчик (по желанию)
            </div>
            
            <select class="form-control">
                <option> Играть с таймером</option>
                <option> Игроть без таймера</option>
            </select>

            <p class="title"> Нажми "начать" (чтобы начать очев)</p> 

            <button onclick="hideXStartGame()">
                Начать
            </button>
        </div>
        <div id="open-when-press-start"
        class="hide">
            <input
            onkeydown="keydown(event)"
            placeholder="Сюда ответ вводить и тд">

            <button
            class="btn btn-primary">
                 Оответить
            </button>
        </div>

</div>
        
<p><button onclick="openMmmhideNnn()"
                id="nnn">
            Нажми пж
        </button></p> 
        
<script src="index.js"></script>
