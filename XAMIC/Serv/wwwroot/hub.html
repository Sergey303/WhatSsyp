<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Scam</title>
    <link rel="stylesheet" href="hub.css">
    <link rel="stylesheet" href="assets/files-style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
</head>
<body>
    <div id="appPanel">
        <div class="chat-row">        
            <div class="col-2">
                <div class="chats-container">
                    <p style="font-weight: bold; text-align: center;">Сервера</p>
                    <ul id="rooms" class="list-group">
                        <li onclick="joinR('Global')" style="font-weight: bold;">🌍 Глобальный чат</li>
                    </ul>
                    <input type="text" id="roomNameInput" class="room-input" placeholder="Название сервера">
                    <button id="serverAddBtn" onclick="createRoom()">+ Добавить Сервер</button>
                    <button class="logout-btn" onclick="Auth.logout()">Выход</button>
                </div>
            </div>
            <div class="col-10">
                <div class="chat-container">
                    <h1>💬 Мессенджер скам</h1>
                    <p class="status-badge">Статус: Подключено</p>
                    <div id="messages" class="messages-box">
                        <div class="message system-message">Чат загружен. Ожидаю подключения к серверу...</div>
                    </div>
                    <div class="input-row">
                        <input type="text" id="messageInput" placeholder="Сообщение..." autocomplete="off">
                        <input type="file" id="fileInp" style="display: none;">
                        <button id="gameBtn" onclick="doinging()"title="начать игру">🎲</button>
                        <button id="fileBtn" title="отправить файл">📄</button>
                        <button id="sendBtn" onclick="sendMessage()" title="отправить">&#10550;</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="assets/signalr.min.js"></script>
    <script src="assets/workshop-chat-helper.js"></script>
    <script src="assets/auth-helper.js"></script>
    <script src="assets/api-helper.js"></script>
    <script src="file-convertor.js"></script>
    <script src="app.js"></script>
</body>
</html>
