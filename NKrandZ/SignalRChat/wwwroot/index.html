<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>S☭ZVon</title>

    <link rel="stylesheet" href="assets/bootstrap.min.css">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script src="assets/signalr.min.js"></script>
    <script src="assets/workshop-chat-helper.js"></script>
    <script src="app.js"></script>
    <div id="login" class="login">
        <h1 class="titl">SoZVoN</h1>
        <div class="logRegInput">
            <input id="nameInput" placeholder="Username (Reg. only)">
            <input id="loginInput" placeholder="Login">
            <input id="passwordInput" placeholder="Password">
        </div>
        <div class="logRegButton">
            <button onclick="login()">Login</button>
            <button onclick="register()">Register</button>
        </div>
    </div>
    <div id="bd" class="bd" hidden>
        <h1>SoZVoN</h1>
        <div class="scn">
            <div class="chatCtrl">
                <button onclick="loadRooms(); joinRoom('General'); loadRoomUsers('General')">&#9776;</button>
                <button onclick="loadRoomUsers(document.getElementById('roomResult').value)">&#8634;</button>
                
            </div>
            <div id="chatInfo" class="chatInfo">
                <select id="chatResult"></select>
            </div>
        </div>
        <div class="scrn">
            <div id="chatSelect" class="chat-select">
                <div id="result"></div>
                <select id="roomResult" onchange="joinRoom(document.getElementById('roomResult').value); loadRoomUsers(document.getElementById('roomResult').value)"></select>
                <div id="newRoomProp" class="newRoomProp" hidden>
                    <div class="newRoomName">
                        <input id="roomNameInput" placeholder="Название">
                        <button onclick="appendRoom()">✔︎</button>
                    </div>
                </div>
                <button id="newRoom" class="newRoom" onclick="newRoom()">➕</button>
            </div>
            <div id="messages" class="chat-box">
                <div class="send-row">
                    <input id="messageInput" placeholder="Сообщение">
                    <button onclick="sendMessage()">&#10550;</button>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
